name: Collect daily papers

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ARXIV_USER_AGENT: ${{ secrets.ARXIV_USER_AGENT }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Collect and rank papers
        run: python scripts/collect.py
      - name: Build dashboard data
        run: python scripts/build_site.py
      - name: Commit daily snapshot
        run: |
          git config user.name "paper-collector[bot]"
          git config user.email "paper-collector[bot]@users.noreply.github.com"
          git add data site/data
          git diff --cached --quiet || git commit -m "data: collect daily papers"
          git push
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: collect
    steps:
      - name: Deploy dashboard to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
